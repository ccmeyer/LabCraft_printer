[pytest]
# Keep root-level pytest runs from crawling large data and artifact trees.
testpaths = tests
python_files = test_*.py
norecursedirs =
    .git
    .pio
    .pytest_cache
    .venv
    env
    venv
    FreeRTOS-interface
    firmware
    artifacts
    Documentation
    docs
    droplet_imager_captures
    hil_reports
    local
    tmp
