[pytest]
# Keep root-level pytest runs from crawling large data and artifact trees.
addopts = -p no:cacheprovider
testpaths = tests
python_files = test_*.py
markers =
    analysis_pipeline: slow, insulated offline analysis-pipeline tests skipped by default; run with --run-analysis-pipeline
norecursedirs =
    .git
    .pio
    .pytest_cache
    .venv
    env
    venv
    FreeRTOS-interface
    firmware
    artifacts
    Documentation
    docs
    droplet_imager_captures
    hil_reports
    local
    tmp
